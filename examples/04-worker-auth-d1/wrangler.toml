name = "cf-auth-demo"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Create with: npx wrangler d1 create cf-auth-demo-db
[[d1_databases]]
binding = "DB"
database_name = "cf-auth-demo-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

# Required secrets (set via `wrangler secret put`):
# JWT_SECRET        — random 32+ byte string
# TURNSTILE_SECRET  — from Cloudflare Turnstile widget (optional but enforced in prod)
# PROD              — set to "1" to hard-require Turnstile
# CORS_ORIGIN       — comma-separated allowed origins (e.g. "https://app.example.com")
# BOOTSTRAP_TOKEN  — one-time token to create the first admin via /api/bootstrap-admin
